<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Mantenimiento - Empléate Aquí</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            
            /* Capa morada combinada con tu imagen de fondo exacta */
            background: linear-gradient(rgba(100, 50, 255, 0.88), rgba(100, 50, 255, 0.88)), 
                        url('worker-protesting-working-rights.jpg') no-repeat center center fixed;
            background-size: cover;
            
            text-align: center;
            padding: 24px;
            position: relative; 
            overflow-x: hidden;
        }

        .container {
            max-width: 700px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 60px; 
        }

        /* --- CONTENEDOR DEL LOGO --- */
        .logo-box {
            width: 180px;
            height: auto;
            margin-bottom: 40px;
        }

        .logo-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- TEXTOS PRINCIPALES --- */
        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 24px;
            text-transform: uppercase;
        }

        p.message {
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.6;
            letter-spacing: 1.2px;
            max-width: 550px;
            text-transform: uppercase;
            opacity: 0.95;
        }

        /* --- FORMULARIO EN LA ESQUINA INFERIOR DERECHA --- */
        .subscribe-form {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 100%;
            max-width: 360px; 
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-end; 
            text-align: right;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 500;
            line-height: 1.4;
            letter-spacing: 0.8px;
            opacity: 0.9;
            max-width: 320px;
            margin-bottom: 4px;
        }

        /* Caja de texto redondeada */
        .input-group {
            width: 100%;
            display: flex;
            background-color: #ffffff;
            border-radius: 30px;
            padding: 4px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .email-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            padding: 10px 18px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            color: #333333;
        }

        .email-input::placeholder {
            color: #999999;
        }

        .submit-btn {
            background-color: #512df7;
            color: #ffffff;
            border: none;
            outline: none;
            padding: 10px 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .submit-btn:hover {
            background-color: #3f1ec7;
        }

        .submit-btn:active {
            transform: scale(0.97);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .form-status {
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            min-height: 1.2em;
            max-width: 320px;
        }

        .form-status.success {
            color: #d4ffda;
        }

        .form-status.error {
            color: #ffd4d4;
        }

        .whatsapp-float {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 80px;
            height: 80px;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .whatsapp-float img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .whatsapp-float:hover {
            transform: scale(1.1); /* efecto de crecimiento */
        }

        @media (max-width: 900px) {
            body {
                flex-direction: column;
                justify-content: flex-start;
                padding-top: 60px;
            }
            .container {
                padding-bottom: 0;
            }
            .subscribe-form {
                position: relative;
                bottom: auto;
                right: auto;
                margin-top: 40px;
                max-width: 450px;
                align-items: center;
                text-align: center;
            }
            .whatsapp-float {
                position: relative;
                bottom: auto;
                left: auto;
                margin-top: 40px;
                margin-bottom: 20px;
                width: 70px;
                height: 70px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }
            p.message {
                font-size: 0.95rem;
            }
            .logo-box {
                width: 140px;
            }
            .input-group {
                flex-direction: column;
                background: transparent;
                padding: 0;
                box-shadow: none;
                gap: 10px;
            }
            .email-input {
                background-color: #ffffff;
                border-radius: 30px;
                width: 100%;
                padding: 12px 20px;
            }
            .submit-btn {
                width: 100%;
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="logo.png" alt="Logo Empléate Aquí">
        </div>

        <h1>En Mantenimiento</h1>

        <p class="message">
            Estamos trabajando para ofrecerte la mejor experiencia en reclutamiento digital
        </p>
    </div>

    <form class="subscribe-form" id="subscribe-form" action="#" method="POST" novalidate>
        <label class="form-label" for="email">
            Déjanos tu email y nuestro equipo se pondrá en contacto contigo
        </label>
        <div class="input-group">
            <input type="email" id="email" name="email" class="email-input" placeholder="Tu correo electrónico" required autocomplete="email">
            <button type="submit" class="submit-btn" id="submit-btn">Enviar</button>
        </div>
        <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
    </form>

    <a href="https://wa.me/+524422696734" target="_blank" class="whatsapp-float">
        <img src="boton-whatsapp.png" alt="Contacto de WhatsApp">
    </a>

    <script>
        const form = document.getElementById('subscribe-form');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submit-btn');
        const formStatus = document.getElementById('form-status');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const email = emailInput.value.trim();
            if (!email) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando...';
            formStatus.textContent = '';
            formStatus.className = 'form-status';

            try {
                const response = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'No pudimos enviar tu correo.');
                }

                formStatus.textContent = data.message;
                formStatus.className = 'form-status success';
                form.reset();
            } catch (error) {
                formStatus.textContent = error.message;
                formStatus.className = 'form-status error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enviar';
            }
        });
    </script>

</body>
</html>
